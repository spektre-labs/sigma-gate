name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: guard · deterministic gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: tests (zero dependencies)
        run: python -m pytest -q
      - name: selftest — prove every threat class fires
        run: python -m guard selftest
